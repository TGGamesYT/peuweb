<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peutron</title>
    <link rel="icon" type="image/x-icon" href="icon.png">
    <style>
        @font-face {
        font-family: 'echo';
        src: url('alpha_echo.ttf');
        }

        body {
            background-image: url("iron.png");
            background-size: 3.125%;
            image-rendering: pixelated;
            margin: 0;
        }
        .titel {
            position: relative;
            text-align: center;
        }
        .banner {
            max-width: 100%;
        }
        .title {
            position: absolute;
            font-family: echo;
            color:rgb(28, 75, 28);
            font-size: 100px;
            margin: 0;
            text-align: center;
            bottom: 0;
            transform: translateX(-50%);
            left: 50%;
        }
        .cardlist {
            
        }
        .card {
            background-color: lightgreen;
            border-radius: 10px;
            margin: 10%;
            padding: 10%;
        }
    </style>
</head>
<body>
    <div class="titel">
        <img src="nobgbanner.png" alt="Peutron's banner" class="banner">
        <h1 class="title">Peutron</h1>
    </div>
    <div class="cardlist">
        <div class="card">
            Card1
        </div>
        <div class="card">
            Card2
        </div>
    </div>
</body>
</html>
